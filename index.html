<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebil Khanal</title>
    <style>
        *{
            margin: 0;
            text-decoration: none;
        }
        header{
            display: flex;
            width: 100vw;
            align-items: center;
            justify-content: center;
        }
        nav{
            display: flex;
            width: 100%;
            justify-content: space-around;
            font-size: 20px;
            padding-top: 20px;
        }
        a{
            color: black;
        }
        #main{
            height: 100vh;
            width: 100vw;
            display: flex;
        }
        #info{
            height: 100%;
            width: 60%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        footer{
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 15px;
        }
        img{
            height: 500px;
        }
        #photo{
            display: flex;
            align-items: center;
        }
        #name{
            font-size: 60px;
            font-weight: bold;
        }
        #role{
            font-size: 40px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Contact</a>
            <a href="">Resume</a>
        </nav>
    </header>
    <div id="main">
        <div id="info">
            <span id="name">Nebil Khanal</span>
            <span id="role">Frontend Developer</span>            
        </div>
        <div id="photo">
            <img src="photo.png" alt="">
        </div>
    </div>
    <footer>
        THANK YOU, COME AGAIN
    </footer>
</body>
</html>
